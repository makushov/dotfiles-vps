# ~/.tmux.conf

# ── General ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0

# ── Mouse ────────────────────────────────────────────────────────────
set -g mouse on

# ── Status bar ───────────────────────────────────────────────────────
set -g status-position top
set -g allow-rename off

# ── Catppuccin plugin config ──────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_date_time_text " %a %b %d %H:%M"

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_cpu_icon "󰻠 "
set -g @catppuccin_ram_icon "󰘚 "
set -g @catppuccin_status_right_separator " " 
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_status_module_text_bg "#585b70"

# Load catppuccin (installed via TPM)
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

# ── Status line ───────────────────────────────────────────────────────
set -g status-right-length 100
set -g status-left-length 100

set -g  status-left  "#{E:@catppuccin_status_session}"
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

# ── Key bindings ─────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Plugins ──────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'catppuccin/tmux'

run '~/.tmux/plugins/tpm/tpm'

set -g status-style "bg=default,fg=#cdd6f4"
